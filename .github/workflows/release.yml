name: Release

# Runs on every push to main (which happens when a PR is merged).
#
# release-please inspects commit history since the previous tag and, if it
# finds releasable commits (conventional commits: feat, fix, etc.), opens a
# "release PR" that bumps the version in pyproject.toml and updates
# CHANGELOG.md. Merging that release PR is what actually creates the git
# tag and the GitHub Release.
#
# So the full flow is:
#   1. Feature PR merged to main  -> release-please opens/updates release PR
#   2. Release PR reviewed + merged -> tag vX.Y.Z + GitHub Release created

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
