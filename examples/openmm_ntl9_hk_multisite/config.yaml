# OpenMM NTL9 Huber-Kim Multisite Configuration
#
# Orchestrator (this process) runs locally; OpenMMSimAgents are
# dispatched to a pre-configured Globus Compute endpoint on the HPC
# host via the Academy Exchange Cloud.
#
# PATHS
# - output_dir is resolved on the orchestrator host.
# - sim_output_dir is passed verbatim to the simulation agent and is
#   resolved on the endpoint host. For --exchange globus use an
#   absolute HPC path. For --exchange local a relative path works.
# - basis_state_dir and reference_file paths must be readable on BOTH
#   hosts at the same resolved path (e.g. pre-stage this example dir
#   on the HPC host, or use absolute paths that exist on both sides).

# --- Orchestrator-side -----------------------------------------------

# Where checkpoints, params.yaml, and runtime.log are written.
output_dir: results/

# Number of WE iterations.
num_iterations: 3

# Basis states — read on the orchestrator at init time to seed
# progress coordinates, AND opened on the sim host as iter-0 restart
# files. Pre-stage the inputs/ directory at a path that resolves to
# the same files on both sides.
basis_states:
  basis_state_dir: inputs/
  basis_state_ext: .pdb
  initial_ensemble_members: 4

# Initial pcoord computation (runs on the orchestrator).
basis_state_initializer:
  reference_file: common_files/reference.pdb
  mda_selection: protein and name CA

# Target state: folded structure (RMSD < 1.0 A).
target_states:
  - label: folded
    pcoord: [1.0]

# Huber-Kim resampling parameters.
# base_dir is the absolute path to this example directory on the
# inference host. The WESTPA agent chdirs here on startup so relative
# paths (checkpointer output, logfile, etc.) resolve correctly.
# Set to null (or omit) for local / single-site runs.
inference_config:
  base_dir: /rbstor/abrace/projects/ddwe/src/deepdrivewe-academy/examples/openmm_ntl9_hk_multisite
  output_dir: results/
  sims_per_bin: 4

# --- Simulation-side -------------------------------------------------

# Where per-iteration simulation dirs (trajectories, restart files)
# are written. Resolved on the endpoint host — absolute for globus.
sim_output_dir: results/simulation/

# OpenMM configuration. reference_file is opened on the endpoint host.
# base_dir is the absolute path to this example directory on the sim
# host. All relative paths (reference_file, top_file, restart files
# from the orchestrator) are resolved against it at runtime — the
# Parsl worker's Python cwd is NOT the example directory.
simulation_config:
  base_dir: /nfs/ml_lab/projects/ml_lab/abrace/projects/ddwe/src/deepdrivewe-academy/examples/openmm_ntl9_hk_multisite
  openmm_config:
    simulation_length_ns: 0.01
    report_interval_ps: 2.0
    dt_ps: 0.002
    temperature_kelvin: 300.0
    solvent_type: implicit
  reference_file: common_files/reference.pdb

# --- Remote compute --------------------------------------------------

# Pre-configured Globus Compute endpoints. Replace each UUID with the
# one printed by `globus-compute-endpoint start <name>`.
# - simulation_endpoint_id (required): GPU endpoint that runs
#   OpenMMSimAgents.
# - inference_endpoint_id (optional): CPU endpoint that runs the
#   WESTPA agent. If omitted (or left null), the agent runs locally
#   on the orchestrator via a ThreadPoolExecutor.
# Both endpoints may point at the same physical host (recommended,
# so the checkpoint/output directory is on a shared filesystem), or
# at different hosts that share `output_dir`.
globus_compute:
  simulation_endpoint_id: a1dfe336-e69d-4d15-a41f-4553fbd9aa05
  # inference_endpoint_id: null
